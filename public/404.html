<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Sisir Pradhan</title>

  <style>
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0f172a;
  color:#fff;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-size:9rem;
  font-weight:800;
  letter-spacing:4px;
  color:#38bdf8;

  text-shadow:
    0 0 8px rgba(56,189,248,.22),
    0 0 18px rgba(56,189,248,.12);

  animation:
    glow404 2.8s ease-in-out infinite alternate,
    float404 4.5s ease-in-out 1.2s infinite;
}
h2{
    opacity:0;
animation:fadeText .7s ease forwards;
animation-delay:.4s;
  margin-top:-15px;
  font-size:2rem;
}

p{
    opacity:0;
animation:fadeText .7s ease forwards;
animation-delay:.7s;
  margin:20px auto 35px;
  max-width:520px;
  color:#cbd5e1;
  line-height:1.7;
}

a{
    opacity:0;
animation:fadeText .7s ease forwards;
animation-delay:1s;
  display:inline-block;
  text-decoration:none;
  background:#38bdf8;
  color:#111827;
  padding:15px 34px;
  border-radius:12px;
  font-weight:700;
  transition:.35s;
  box-shadow:0 10px 35px rgba(56,189,248,.35);
}

a:hover{
  transform:translateY(-5px) scale(1.04);
  box-shadow:0 18px 45px rgba(56,189,248,.45);
}

.circle{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
  opacity:.18;
  animation:float 14s ease-in-out infinite;
  pointer-events:none;
}

.c1{
  width:420px;
  height:420px;

  top:-180px;
  left:-180px;

  background:radial-gradient(
    circle,
    rgba(56,189,248,.22) 0%,
    rgba(56,189,248,.10) 45%,
    rgba(56,189,248,0) 75%
  );
}

.c2{
  width:340px;
  height:340px;

  bottom:-140px;
  right:-140px;

  animation-duration:16s;

  background:radial-gradient(
    circle,
    rgba(37,99,235,.18) 0%,
    rgba(37,99,235,.08) 45%,
    rgba(37,99,235,0) 75%
  );
}

.c3{
  width:260px;
  height:260px;

  top:58%;
  left:12%;

  animation-duration:18s;

  background:radial-gradient(
    circle,
    rgba(14,165,233,.16) 0%,
    rgba(14,165,233,.06) 45%,
    rgba(14,165,233,0) 75%
  );
}
.footer{
  margin-top:45px;
  color:#94a3b8;
  font-size:.95rem;
}

@keyframes glow404{

0%{
    text-shadow:
      0 0 6px rgba(56,189,248,.18),
      0 0 14px rgba(56,189,248,.10);
}

50%{
    text-shadow:
      0 0 10px rgba(56,189,248,.28),
      0 0 20px rgba(56,189,248,.16);
}

100%{
    text-shadow:
      0 0 8px rgba(56,189,248,.22),
      0 0 16px rgba(56,189,248,.12);
}

}
@keyframes fadeText{

from{
  opacity:0;
  transform:translateY(12px);
}

to{
  opacity:1;
  transform:translateY(0);
}

}
@keyframes float404{

0%{
    transform:translateY(0);
}

25%{
    transform:translateY(-2px);
}

50%{
    transform:translateY(-3px);
}

75%{
    transform:translateY(-2px);
}

100%{
    transform:translateY(0);
}

}
/* @keyframes fadeIn404{

0%{
    opacity:0;
    transform:translateY(18px) scale(.96);
}

70%{
    opacity:1;
    transform:translateY(0) scale(1);
}

100%{
    opacity:1;
    transform:translateY(0) scale(1);
}

} */

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-30px);
}

100%{
transform:translateY(0px);
}

}
  </style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="container">

    <h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
Let's get you back to exploring my portfolio.
</p>

<a href="/">
🏠 Back to Home
</a>

<div class="footer">
Designed by <strong>Sisir Pradhan</strong>
</div>

</div>

</body>
</html>
