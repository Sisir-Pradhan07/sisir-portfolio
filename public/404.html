<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Sisir Pradhan</title>

  <style>
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:#fff;

  background:
    radial-gradient(circle at top left,
      rgba(56,189,248,.05),
      transparent 35%),

    radial-gradient(circle at bottom right,
      rgba(56,189,248,.04),
      transparent 45%),

    linear-gradient(
      180deg,
      #111827 0%,
      #0f172a 100%
    );
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-size:10rem;
  font-weight:800;
  letter-spacing:4px;
  color:#38bdf8;

  text-shadow:
    0 0 8px rgba(56,189,248,.22),
    0 0 18px rgba(56,189,248,.12);

  animation:
    glow404 2.8s ease-in-out infinite alternate,
    float404 4.5s ease-in-out 1.2s infinite;
}
h2{
    opacity:0;
animation:fadeText .7s ease forwards;
animation-delay:.4s;
  margin-top:-10px;
  font-size:2rem;
}

p{
    opacity:0;
animation:fadeText .7s ease forwards;
animation-delay:.7s;
  margin:20px auto 35px;
  max-width:520px;
  color:#cbd5e1;
  line-height:1.7;
}

a{
    opacity:0;
animation:fadeText .7s ease forwards;
animation-delay:1s;
  display:inline-block;
  text-decoration:none;
  background:#38bdf8;
  color:#111827;
  padding:15px 34px;
  border-radius:12px;
  font-weight:700;
  transition:
    transform .25s ease,
    box-shadow .25s ease,
    background-color .25s ease;
  box-shadow:0 10px 35px rgba(56,189,248,.35);
}

a:hover{
  transform:translateY(-5px) scale(1.04);
  box-shadow:0 18px 45px rgba(56,189,248,.45);
}


.footer{
  margin-top:45px;
  color:#94a3b8;
  font-size:.95rem;
}

@keyframes glow404{

0%{
    text-shadow:
      0 0 6px rgba(56,189,248,.18),
      0 0 14px rgba(56,189,248,.10);
}

50%{
    text-shadow:
      0 0 10px rgba(56,189,248,.28),
      0 0 20px rgba(56,189,248,.16);
}

100%{
    text-shadow:
      0 0 8px rgba(56,189,248,.22),
      0 0 16px rgba(56,189,248,.12);
}

}
@keyframes fadeText{

from{
  opacity:0;
  transform:translateY(12px);
}

to{
  opacity:1;
  transform:translateY(0);
}

}
@keyframes float404{

0%{
    transform:translateY(0);
}

25%{
    transform:translateY(-2px);
}

50%{
    transform:translateY(-3px);
}

75%{
    transform:translateY(-2px);
}

100%{
    transform:translateY(0);
}

}
  </style>
</head>

<body>

<div class="container">

    <h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
Let's get you back to exploring my portfolio.
</p>

<a href="/">
🏠 Back to Home
</a>

<div class="footer">
© 2026 <strong>Sisir Pradhan</strong>
</div>

</div>

</body>
</html>
