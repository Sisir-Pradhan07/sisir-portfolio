<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Sisir Pradhan</title>

  <style>
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,Helvetica,sans-serif;
  min-height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
  radial-gradient(circle at top,#1e3a8a 0%,#111827 45%,#0b1120 100%);
  color:#fff;
  position:relative;
}

.container{
  text-align:center;
  z-index:2;
  padding:20px;
}

h1{
  font-size:9rem;
  color:#38bdf8;
  text-shadow:
  0 0 10px #38bdf8,
  0 0 25px #38bdf8,
  0 0 45px #0ea5e9;
  animation:glow 2s ease-in-out infinite alternate;
}

h2{
  margin-top:-15px;
  font-size:2rem;
}

p{
  margin:20px auto 35px;
  max-width:520px;
  color:#cbd5e1;
  line-height:1.7;
}

a{
  display:inline-block;
  text-decoration:none;
  background:#38bdf8;
  color:#111827;
  padding:15px 34px;
  border-radius:12px;
  font-weight:700;
  transition:.35s;
  box-shadow:0 10px 35px rgba(56,189,248,.35);
}

a:hover{
  transform:translateY(-5px) scale(1.04);
  box-shadow:0 18px 45px rgba(56,189,248,.45);
}

.circle{
  position:absolute;
  border-radius:50%;
  filter:blur(40px);
  opacity:.25;
  animation:float 12s linear infinite;
}

.c1{
  width:240px;
  height:240px;
  background:#38bdf8;
  top:-60px;
  left:-80px;
}

.c2{
  width:180px;
  height:180px;
  background:#2563eb;
  bottom:-50px;
  right:-60px;
  animation-duration:16s;
}

.c3{
  width:140px;
  height:140px;
  background:#0ea5e9;
  top:55%;
  left:15%;
  animation-duration:18s;
}

.footer{
  margin-top:45px;
  color:#94a3b8;
  font-size:.95rem;
}

@keyframes glow{

from{
transform:scale(.98);
}

to{
transform:scale(1.03);
}

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-30px);
}

100%{
transform:translateY(0px);
}

}
  </style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="container">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
Let's get you back to exploring my portfolio.
</p>

<a href="/">
🏠 Back to Home
</a>

<div class="footer">
Designed by <strong>Sisir Pradhan</strong>
</div>

</div>

</body>
</html>
