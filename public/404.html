<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Sisir Pradhan</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#111827;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      text-align:center;
      padding:20px;
    }

    .container{
      max-width:600px;
    }

    h1{
      font-size:7rem;
      color:#38bdf8;
      margin-bottom:10px;
    }

    h2{
      font-size:2rem;
      margin-bottom:15px;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
      margin-bottom:30px;
    }

    a{
      display:inline-block;
      background:#38bdf8;
      color:#111827;
      text-decoration:none;
      padding:14px 28px;
      border-radius:10px;
      font-weight:600;
      transition:.25s;
    }

    a:hover{
      transform:translateY(-2px);
      opacity:.9;
    }
  </style>
</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
</p>

<a href="/">
🏠 Back to Home
</a>

</div>

</body>
</html>
