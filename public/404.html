<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Sisir Pradhan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    color:#fff;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,
    rgba(56,189,248,.05),
    transparent 35%),

    radial-gradient(circle at bottom right,
    rgba(56,189,248,.04),
    transparent 45%),

    linear-gradient(
    180deg,
    #111827 0%,
    #0f172a 100%);
}

/* ---------- Ambient Lights ---------- */

/* ---------- Ambient Lights ---------- */

.ambient{
    position:fixed;
    pointer-events:none;
    z-index:0;
    border-radius:50%;
    animation:ambientPulse 8s ease-in-out infinite;
}

.ambient1{
    width:650px;
    height:650px;

    top:-280px;
    left:-280px;

    background:radial-gradient(
        circle,
        rgba(56,189,248,.18) 0%,
        rgba(56,189,248,.10) 25%,
        rgba(56,189,248,.05) 45%,
        rgba(56,189,248,0) 75%
    );

    animation:
        move1 14s ease-in-out infinite,
        ambientPulse 8s ease-in-out infinite;
}

.ambient2{
    width:600px;
    height:600px;

    bottom:-250px;
    right:-250px;

    background:radial-gradient(
        circle,
        rgba(37,99,235,.16) 0%,
        rgba(37,99,235,.08) 28%,
        rgba(37,99,235,.04) 48%,
        rgba(37,99,235,0) 75%
    );

    animation:
        move2 18s ease-in-out infinite,
        ambientPulse 10s ease-in-out infinite;
}

/* ---------- Container ---------- */

.container{

    position:relative;
    z-index:1;

    min-height:100vh;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:20px;
}

/* ---------- 404 ---------- */

h1{

    font-size:9rem;
    font-weight:800;
    letter-spacing:4px;
    color:#38bdf8;

    text-shadow:
    0 0 6px rgba(56,189,248,.18),
    0 0 18px rgba(56,189,248,.12);

    animation:
    glow404 2.8s ease-in-out infinite alternate,
    float404 4.5s ease-in-out infinite;

}

/* ---------- Heading ---------- */

h2{

    opacity:0;

    margin-top:-10px;

    font-size:2rem;

    animation:fadeText .7s ease forwards;
    animation-delay:.3s;

}

/* ---------- Paragraph ---------- */

p{

    opacity:0;

    margin:20px auto 35px;

    max-width:540px;

    color:#cbd5e1;

    line-height:1.7;

    animation:fadeText .7s ease forwards;
    animation-delay:.6s;

}

/* ---------- Button ---------- */

a{

    opacity:0;

    display:inline-block;

    text-decoration:none;

    background:#38bdf8;

    color:#111827;

    padding:15px 34px;

    border-radius:12px;

    font-weight:700;

    transition:
    transform .25s ease,
    box-shadow .25s ease,
    background-color .25s ease;

    box-shadow:
    0 10px 35px rgba(56,189,248,.30);

    animation:fadeText .7s ease forwards;
    animation-delay:.9s;

}

a:hover{

    transform:
    translateY(-4px)
    scale(1.03);

    box-shadow:
    0 18px 45px rgba(56,189,248,.40);

}

/* ---------- Footer ---------- */

.footer{

    opacity:0;

    margin-top:45px;

    color:#94a3b8;

    font-size:.95rem;

    animation:fadeText .7s ease forwards;
    animation-delay:1.2s;

}

/* ---------- Animations ---------- */

@keyframes glow404{

0%{

text-shadow:
0 0 6px rgba(56,189,248,.18),
0 0 14px rgba(56,189,248,.08);

}

100%{

text-shadow:
0 0 10px rgba(56,189,248,.30),
0 0 22px rgba(56,189,248,.18);

}

}

@keyframes float404{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-4px);

}

}

@keyframes fadeText{

from{

opacity:0;
transform:translateY(12px);

}

to{

opacity:1;
transform:translateY(0);

}

}

@keyframes move1{

0%,100%{

transform:translate(0,0);

}

50%{

transform:translate(35px,25px);

}

}

@keyframes move2{

0%,100%{

transform:translate(0,0);

}

50%{

transform:translate(-30px,-20px);

}

}

/* ---------- Mobile ---------- */

@media(max-width:768px){

h1{

font-size:6rem;

}

h2{

font-size:1.5rem;

}

p{

font-size:.95rem;

padding:0 10px;

}

a{

padding:13px 28px;

}

}
@keyframes ambientPulse{

  0%,100%{
    opacity:.8;
    transform:scale(1);
  }

  50%{
    opacity:1;
    transform:scale(1.08);
  }

}

</style>

</head>

<body>

<div class="ambient ambient1"></div>
<div class="ambient ambient2"></div>

<div class="container">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
Let's get you back to exploring my portfolio.
</p>

<a href="/">
🏠 Back to Home
</a>

<div class="footer">
© 2026 <strong>Sisir Pradhan</strong>
</div>

</div>

</body>
</html>
